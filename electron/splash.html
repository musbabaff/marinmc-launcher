<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>MarinMC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes spinReverse {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.08); }
    }

    @keyframes progressGlow {
      0%, 100% { box-shadow: 0 0 8px rgba(45, 125, 210, 0.4); }
      50% { box-shadow: 0 0 16px rgba(45, 125, 210, 0.7); }
    }

    @keyframes titleReveal {
      from { opacity: 0; letter-spacing: 0.35em; }
      to { opacity: 1; letter-spacing: 0.22em; }
    }

    body {
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      -webkit-app-region: drag;
      user-select: none;
    }

    .splash {
      width: 420px;
      height: 320px;
      background: #060a12;
      border-radius: 22px;
      border: 1px solid rgba(45, 125, 210, 0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255,255,255,0.02) inset;
    }

    /* Ambient background glow */
    .bg-glow {
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(45, 125, 210, 0.07) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: breathe 5s ease-in-out infinite;
    }

    /* Logo area */
    .logo-area {
      position: relative;
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      z-index: 2;
    }

    .ring-1 {
      position: absolute;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 1.5px solid transparent;
      border-top-color: rgba(45, 125, 210, 0.5);
      border-right-color: rgba(45, 125, 210, 0.15);
      animation: spin 2.5s linear infinite;
    }

    .ring-2 {
      position: absolute;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 1px solid transparent;
      border-bottom-color: rgba(74, 154, 232, 0.35);
      border-left-color: rgba(74, 154, 232, 0.1);
      animation: spinReverse 3.5s linear infinite;
    }

    /* M Letter */
    .m-logo {
      z-index: 3;
      font-size: 36px;
      font-weight: 900;
      color: #2D7DD2;
      text-shadow: 0 0 20px rgba(45, 125, 210, 0.4), 0 0 40px rgba(45, 125, 210, 0.15);
      line-height: 1;
    }

    /* Brand text */
    .brand {
      text-align: center;
      z-index: 2;
      margin-bottom: 24px;
    }

    .brand-title {
      font-size: 18px;
      font-weight: 900;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      opacity: 0;
      animation: titleReveal 0.8s ease-out 0.2s forwards;
    }

    .brand-sub {
      font-size: 8px;
      font-weight: 700;
      color: rgba(45, 125, 210, 0.6);
      text-transform: uppercase;
      letter-spacing: 0.35em;
      margin-top: 5px;
      opacity: 0;
      animation: fadeIn 0.6s ease-out 0.5s forwards;
    }

    /* Loading section */
    .loading {
      width: 200px;
      z-index: 2;
      text-align: center;
    }

    .status {
      font-size: 8px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.25);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      min-height: 12px;
      transition: color 0.3s;
    }

    .bar-track {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 3px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #1a5fa8, #2D7DD2, #4A9AE8);
      border-radius: 3px;
      transition: width 0.1s ease-out;
      animation: progressGlow 2s ease-in-out infinite;
    }

    .version {
      position: absolute;
      bottom: 10px;
      right: 14px;
      font-size: 8px;
      font-weight: 700;
      color: rgba(45, 125, 210, 0.25);
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="bg-glow"></div>

    <div class="logo-area">
      <div class="ring-1"></div>
      <div class="ring-2"></div>
      <div class="m-logo">M</div>
    </div>

    <div class="brand">
      <div class="brand-title">MarinMC</div>
      <div class="brand-sub">Minecraft Launcher</div>
    </div>

    <div class="loading">
      <div class="status" id="st">Başlatılıyor...</div>
      <div class="bar-track">
        <div class="bar-fill" id="bar"></div>
      </div>
    </div>

    <div class="version">v0.9.2</div>
  </div>

  <script>
    const bar = document.getElementById('bar');
    const st = document.getElementById('st');
    let p = 0;
    const stages = [
      { at: 0, t: 'Başlatıcı yapılandırılıyor...' },
      { at: 15, t: 'Dosyalar kontrol ediliyor...' },
      { at: 35, t: 'Modüller yükleniyor...' },
      { at: 55, t: 'Arayüz hazırlanıyor...' },
      { at: 75, t: 'Sunucuya bağlanılıyor...' },
      { at: 92, t: 'Neredeyse hazır...' },
    ];
    function tick() {
      let d;
      if (p < 25) d = Math.random() * 2.5 + 1.2;
      else if (p < 45) d = Math.random() * 1.5 + 0.6;
      else if (p < 75) d = Math.random() * 3.5 + 1.5;
      else if (p < 92) d = Math.random() * 0.8 + 0.3;
      else d = Math.random() * 2 + 0.8;
      p += d;
      if (p >= 100) {
        p = 100;
        bar.style.width = '100%';
        st.textContent = 'Hazır!';
        st.style.color = '#2D7DD2';
        return;
      }
      bar.style.width = p + '%';
      let txt = stages[0].t;
      for (const s of stages) { if (p >= s.at) txt = s.t; }
      st.textContent = txt;
      setTimeout(tick, Math.random() * 40 + 20);
    }
    setTimeout(tick, 100);
  </script>
</body>
</html>
