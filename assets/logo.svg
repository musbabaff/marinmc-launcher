<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A9AE8" />
      <stop offset="100%" stop-color="#2D7DD2" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect x="10" y="10" width="80" height="80" rx="22" fill="#060305" stroke="url(#logoGrad)" stroke-width="2" />
  <!-- MarinMC "M" Logo -->
  <path d="M 25,72 V 28 L 50,58 L 75,28 V 72" 
        stroke="url(#logoGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)" />
</svg>
