<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" />
      <stop offset="50%" stop-color="#2D7DD2" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0a10" />
      <stop offset="100%" stop-color="#060305" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#2D7DD2" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect x="6" y="6" width="88" height="88" rx="20" fill="url(#bgGrad)" stroke="url(#logoGrad)" stroke-width="1.5" opacity="0.95"/>
  <!-- M letterform — bold geometric with center chevron -->
  <g filter="url(#glow)">
    <!-- Left vertical stroke -->
    <path d="M 24,74 V 26" stroke="url(#logoGrad)" stroke-width="8" stroke-linecap="round" fill="none"/>
    <!-- Left diagonal -->
    <path d="M 24,26 L 50,54" stroke="url(#logoGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Right diagonal -->
    <path d="M 50,54 L 76,26" stroke="url(#logoGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Right vertical stroke -->
    <path d="M 76,26 V 74" stroke="url(#logoGrad)" stroke-width="8" stroke-linecap="round" fill="none"/>
  </g>
</svg>
