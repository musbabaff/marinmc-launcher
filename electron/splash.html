<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarinMC Launcher</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      -webkit-app-region: drag;
      user-select: none;
    }

    .splash-container {
      width: 420px;
      height: 300px;
      background: radial-gradient(ellipse at 30% 20%, #0a1628 0%, #060305 60%, #050207 100%);
      border-radius: 24px;
      border: 1px solid rgba(45, 125, 210, 0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      box-shadow:
        0 30px 70px rgba(0, 0, 0, 0.95),
        0 0 80px rgba(45, 125, 210, 0.08),
        inset 0 1px 1px rgba(255, 255, 255, 0.04);
      position: relative;
      overflow: hidden;
    }

    /* Subtle ocean wave glow */
    .glow-wave {
      position: absolute;
      bottom: -60%;
      left: -20%;
      width: 140%;
      height: 200px;
      background: radial-gradient(ellipse, rgba(45, 125, 210, 0.12) 0%, transparent 65%);
      filter: blur(40px);
      pointer-events: none;
      animation: wave-drift 8s infinite alternate ease-in-out;
    }

    .glow-top {
      position: absolute;
      top: -40%;
      right: -10%;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(45, 125, 210, 0.08) 0%, transparent 70%);
      filter: blur(50px);
      pointer-events: none;
      animation: wave-drift-2 10s infinite alternate ease-in-out;
    }

    @keyframes wave-drift {
      0% { transform: translateX(0) scale(1); opacity: 0.6; }
      100% { transform: translateX(30px) scale(1.1); opacity: 1; }
    }

    @keyframes wave-drift-2 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-20px, 15px) scale(1.15); }
    }

    /* Logo container with clean ring */
    .logo-container {
      position: relative;
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }

    .ring {
      position: absolute;
      width: 100px;
      height: 100px;
      border: 1.5px solid rgba(45, 125, 210, 0.15);
      border-top-color: rgba(45, 125, 210, 0.5);
      border-radius: 50%;
      animation: rotate-ring 3s linear infinite;
    }

    .ring-inner {
      position: absolute;
      width: 82px;
      height: 82px;
      border: 1px solid rgba(45, 125, 210, 0.08);
      border-bottom-color: rgba(74, 154, 232, 0.35);
      border-radius: 50%;
      animation: rotate-ring 4s linear infinite reverse;
    }

    @keyframes rotate-ring {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .logo-m {
      position: relative;
      z-index: 10;
      animation: logo-breathe 3s ease-in-out infinite;
    }

    .logo-m svg {
      width: 44px;
      height: 44px;
    }

    @keyframes logo-breathe {
      0%, 100% {
        filter: drop-shadow(0 0 12px rgba(45, 125, 210, 0.4));
        transform: scale(1);
      }
      50% {
        filter: drop-shadow(0 0 22px rgba(45, 125, 210, 0.6));
        transform: scale(1.03);
      }
    }

    /* Brand text */
    .brand-section {
      text-align: center;
      z-index: 5;
    }

    .brand-title {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0.2em;
      color: #ffffff;
      text-transform: uppercase;
      opacity: 0;
      animation: title-in 0.8s forwards ease-out 0.3s;
    }

    .brand-subtitle {
      font-size: 9px;
      color: rgba(45, 125, 210, 0.7);
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 4px;
      opacity: 0;
      animation: fade-in-up 0.8s forwards ease-out 0.6s;
    }

    @keyframes title-in {
      0% { opacity: 0; letter-spacing: 0.35em; transform: scale(0.96); }
      100% { opacity: 1; letter-spacing: 0.2em; transform: scale(1); }
    }

    @keyframes fade-in-up {
      0% { opacity: 0; transform: translateY(6px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Loading bar */
    .loading-section {
      width: 220px;
      text-align: center;
      z-index: 5;
      margin-top: 2px;
    }

    .status-text {
      font-size: 8px;
      color: rgba(255, 255, 255, 0.3);
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      min-height: 12px;
      transition: color 0.3s;
    }

    .progress-container {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.02);
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #1a5fa8 0%, #2D7DD2 40%, #4A9AE8 100%);
      border-radius: 4px;
      box-shadow: 0 0 10px rgba(45, 125, 210, 0.5);
      transition: width 0.1s ease-out;
    }

    .version-badge {
      position: absolute;
      bottom: 12px;
      right: 16px;
      font-size: 8px;
      color: rgba(45, 125, 210, 0.3);
      font-weight: 800;
      z-index: 5;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <div class="glow-wave"></div>
    <div class="glow-top"></div>

    <div class="logo-container">
      <div class="ring"></div>
      <div class="ring-inner"></div>
      <div class="logo-m">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="mGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#4A9AE8" />
              <stop offset="100%" stop-color="#2D7DD2" />
            </linearGradient>
          </defs>
          <path d="M2 20V4h3.5l4.5 8 4.5-8H18v16h-3V9l-3.5 6h-3L5 9v11H2z" fill="url(#mGrad)" />
        </svg>
      </div>
    </div>

    <div class="brand-section">
      <div class="brand-title">MarinMC</div>
      <div class="brand-subtitle">Minecraft Launcher</div>
    </div>

    <div class="loading-section">
      <div class="status-text" id="statusText">Başlatılıyor...</div>
      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>

    <div class="version-badge">v0.9.2</div>
  </div>

  <script>
    const bar = document.getElementById('progressBar');
    const statusText = document.getElementById('statusText');
    
    let progress = 0;
    const stages = [
      { at: 0, text: 'Başlatıcı yapılandırılıyor...' },
      { at: 15, text: 'Dosya kontrol sistemleri...' },
      { at: 35, text: 'Modüller yükleniyor...' },
      { at: 55, text: 'Arayüz hazırlanıyor...' },
      { at: 75, text: 'MarinMC sunucusuna bağlanılıyor...' },
      { at: 92, text: 'Neredeyse hazır...' },
    ];

    function updateProgress() {
      let delta = 0;
      if (progress < 25) {
        delta = Math.random() * 2.5 + 1.2;
      } else if (progress >= 25 && progress < 45) {
        delta = Math.random() * 1.5 + 0.6;
      } else if (progress >= 45 && progress < 75) {
        delta = Math.random() * 3.5 + 1.5;
      } else if (progress >= 75 && progress < 92) {
        delta = Math.random() * 0.8 + 0.3;
      } else {
        delta = Math.random() * 2.0 + 0.8;
      }

      progress += delta;
      
      if (progress >= 100) {
        progress = 100;
        bar.style.width = '100%';
        statusText.textContent = 'Hazır!';
        statusText.style.color = '#2D7DD2';
        return;
      }

      bar.style.width = progress + '%';

      let currentText = stages[0].text;
      for (const stage of stages) {
        if (progress >= stage.at) {
          currentText = stage.text;
        }
      }
      statusText.textContent = currentText;

      setTimeout(updateProgress, Math.random() * 40 + 20);
    }

    setTimeout(updateProgress, 100);
  </script>
</body>
</html>
