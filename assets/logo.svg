<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect x="10" y="10" width="80" height="80" rx="20" fill="#131622" stroke="url(#logoGrad)" stroke-width="2.5" />
  <!-- A futuristic stylized 'M' -->
  <path d="M 28,70 L 28,35 L 43,53 L 50,45 L 57,53 L 72,35 L 72,70" 
        stroke="url(#logoGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)" />
  <circle cx="50" cy="30" r="4" fill="#3B82F6" />
</svg>
