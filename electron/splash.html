<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>MarinMC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulseRing {
      0% { transform: scale(0.85); opacity: 0.6; }
      50% { transform: scale(1.15); opacity: 0; }
      100% { transform: scale(0.85); opacity: 0; }
    }

    @keyframes logoReveal {
      0% { opacity: 0; transform: scale(0.6) rotate(-10deg); filter: blur(8px); }
      60% { opacity: 1; transform: scale(1.05) rotate(2deg); filter: blur(0); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); filter: blur(0); }
    }

    @keyframes titleSlide {
      from { opacity: 0; letter-spacing: 0.5em; filter: blur(4px); }
      to { opacity: 1; letter-spacing: 0.28em; filter: blur(0); }
    }

    @keyframes subtitleFade {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 0.6; transform: translateY(0); }
    }

    @keyframes barShimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes particleDrift {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-180px) translateX(30px); opacity: 0; }
    }

    @keyframes gridPulse {
      0%, 100% { opacity: 0.02; }
      50% { opacity: 0.05; }
    }

    html, body {
      background: transparent !important;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      -webkit-app-region: drag;
      user-select: none;
    }

    .splash {
      width: 440px;
      height: 340px;
      background: linear-gradient(135deg, #070b19 0%, #0a0f24 100%);
      border-radius: 28px;
      border: 1px solid rgba(45, 125, 210, 0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.95),
        0 0 40px rgba(45, 125, 210, 0.15),
        0 0 0 1px rgba(255, 255, 255, 0.01) inset;
    }

    /* Grid background pattern */
    .grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(45, 125, 210, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(45, 125, 210, 0.04) 1px, transparent 1px);
      background-size: 36px 36px;
      animation: gridPulse 6s ease-in-out infinite;
      pointer-events: none;
    }

    /* Curved corner accents */
    .corner-accent {
      position: absolute;
      width: 60px;
      height: 60px;
      pointer-events: none;
      z-index: 1;
    }
    .corner-accent.tl {
      top: 0; left: 0;
      border-top: 1px solid rgba(45, 125, 210, 0.25);
      border-left: 1px solid rgba(45, 125, 210, 0.25);
      border-radius: 28px 0 0 0;
    }
    .corner-accent.br {
      bottom: 0; right: 0;
      border-bottom: 1px solid rgba(45, 125, 210, 0.25);
      border-right: 1px solid rgba(45, 125, 210, 0.25);
      border-radius: 0 0 28px 0;
    }

    /* Floating particles */
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(45, 125, 210, 0.4);
      border-radius: 50%;
      pointer-events: none;
      animation: particleDrift linear infinite;
    }
    .particle:nth-child(1) { left: 15%; bottom: 20px; animation-duration: 6s; animation-delay: 0s; }
    .particle:nth-child(2) { left: 35%; bottom: 10px; animation-duration: 8s; animation-delay: 1s; width: 1.5px; height: 1.5px; background: rgba(74, 154, 232, 0.5); }
    .particle:nth-child(3) { left: 55%; bottom: 30px; animation-duration: 7s; animation-delay: 2s; }
    .particle:nth-child(4) { left: 75%; bottom: 15px; animation-duration: 9s; animation-delay: 0.5s; width: 1px; height: 1px; }
    .particle:nth-child(5) { left: 88%; bottom: 25px; animation-duration: 5.5s; animation-delay: 3s; }
    .particle:nth-child(6) { left: 25%; bottom: 5px; animation-duration: 10s; animation-delay: 1.5s; width: 1px; height: 1px; opacity: 0.5; }
    .particle:nth-child(7) { left: 65%; bottom: 40px; animation-duration: 7.5s; animation-delay: 0.8s; width: 1.5px; height: 1.5px; }

    /* Logo container */
    .logo-area {
      position: relative;
      width: 88px;
      height: 88px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
      z-index: 2;
      animation: float 4s ease-in-out infinite;
    }

    /* Hexagonal border */
    .hex-border {
      position: absolute;
      width: 88px;
      height: 88px;
    }
    .hex-border svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 12px rgba(45, 125, 210, 0.3));
    }
    .hex-border .hex-path {
      fill: none;
      stroke: rgba(45, 125, 210, 0.2);
      stroke-width: 1.2;
    }
    .hex-border .hex-path-glow {
      fill: none;
      stroke: url(#hexGrad);
      stroke-width: 1.8;
      stroke-dasharray: 300;
      stroke-dashoffset: 300;
      animation: hexDraw 2s ease-out 0.3s forwards;
    }
    @keyframes hexDraw {
      to { stroke-dashoffset: 0; }
    }

    /* Pulse rings behind logo */
    .pulse-ring {
      position: absolute;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 1px solid rgba(45, 125, 210, 0.08);
      animation: pulseRing 3s ease-out infinite;
    }
    .pulse-ring:nth-child(2) {
      animation-delay: 1s;
    }

    /* M Letter */
    .m-logo {
      z-index: 3;
      width: 72px;
      height: 72px;
      object-fit: contain;
      filter: drop-shadow(0 0 24px rgba(45, 125, 210, 0.55));
      animation: logoReveal 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    /* Brand text */
    .brand {
      text-align: center;
      z-index: 2;
      margin-bottom: 28px;
    }

    .brand-title {
      font-size: 20px;
      font-weight: 900;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 0.28em;
      opacity: 0;
      animation: titleSlide 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    .brand-sub {
      font-size: 8px;
      font-weight: 700;
      color: #4A9AE8;
      text-transform: uppercase;
      letter-spacing: 0.4em;
      margin-top: 6px;
      opacity: 0;
      animation: subtitleFade 0.8s ease-out 0.7s forwards;
    }

    /* Loading section */
    .loading {
      width: 220px;
      z-index: 2;
      text-align: center;
      opacity: 0;
      animation: fadeIn 0.5s ease-out 0.9s forwards;
    }

    .status {
      font-size: 8px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
      min-height: 12px;
      transition: color 0.4s ease;
    }

    .bar-track {
      width: 100%;
      height: 3px;
      background: rgba(45, 125, 210, 0.15);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, 
        #2D7DD2, 
        #4A9AE8, 
        #2D7DD2
      );
      background-size: 200% 100%;
      border-radius: 3px;
      transition: width 0.15s ease-out;
      animation: barShimmer 2s linear infinite;
      box-shadow: 0 0 10px rgba(45, 125, 210, 0.6);
    }

    /* Percentage text */
    .percent {
      font-size: 9px;
      font-weight: 800;
      color: rgba(45, 125, 210, 0.6);
      margin-top: 8px;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.05em;
      transition: color 0.4s ease;
    }

    .version {
      position: absolute;
      bottom: 12px;
      right: 18px;
      font-size: 7.5px;
      font-weight: 700;
      color: rgba(45, 125, 210, 0.4);
      z-index: 2;
      letter-spacing: 0.08em;
    }

    .copyright {
      position: absolute;
      bottom: 12px;
      left: 18px;
      font-size: 7px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.15);
      z-index: 2;
      letter-spacing: 0.04em;
    }

    /* Completion state */
    .splash.done .bar-fill {
      background: linear-gradient(90deg, #4A9AE8, #ffffff, #4A9AE8);
      box-shadow: 0 0 16px rgba(45, 125, 210, 0.8);
    }
    .splash.done .status {
      color: #ffffff;
    }
    .splash.done .percent {
      color: #4A9AE8;
    }
  </style>
</head>

  <script>
    const bar = document.getElementById('bar');
    const st = document.getElementById('st');
    const pct = document.getElementById('pct');
    const splashEl = document.getElementById('splashEl');
    let p = 0;
    const stages = [
      { at: 0,  t: 'Başlatıcı yapılandırılıyor...' },
      { at: 12, t: 'Temel dosyalar kontrol ediliyor...' },
      { at: 28, t: 'Modüller yükleniyor...' },
      { at: 45, t: 'Arayüz bileşenleri hazırlanıyor...' },
      { at: 62, t: 'Sunucu bağlantısı kuruluyor...' },
      { at: 78, t: 'Oturum doğrulanıyor...' },
      { at: 90, t: 'Neredeyse hazır...' },
    ];
    function tick() {
      let d;
      if (p < 20) d = Math.random() * 2.8 + 1.5;
      else if (p < 50) d = Math.random() * 1.8 + 0.8;
      else if (p < 80) d = Math.random() * 3 + 1.2;
      else if (p < 93) d = Math.random() * 0.6 + 0.2;
      else d = Math.random() * 1.5 + 0.5;
      p += d;
      if (p >= 100) {
        p = 100;
        bar.style.width = '100%';
        st.textContent = 'Hazır!';
        pct.textContent = '100%';
        splashEl.classList.add('done');
        return;
      }
      bar.style.width = p + '%';
      pct.textContent = Math.floor(p) + '%';
      let txt = stages[0].t;
      for (const s of stages) { if (p >= s.at) txt = s.t; }
      st.textContent = txt;
      setTimeout(tick, Math.random() * 35 + 18);
    }
    setTimeout(tick, 200);
  </script>
