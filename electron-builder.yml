appId: com.marinmc.launcher
productName: MarinMC Launcher
copyright: Copyright © 2026 MarinMC

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

extraFiles:
  - from: assets/
    to: assets/
    filter:
      - "**/*"
      - "!*.psd"
      - "!*.ai"
      # The client mod is downloaded from GitHub at runtime, so bundling the
      # 77MB jar only bloats the installer and slows auto-updates. MarinLogo.png
      # is just the icon source. Neither is read at runtime.
      - "!marinmc-client-mod-1.0.0.jar"
      - "!MarinLogo.png"

asar: true

win:
  artifactName: "MarinMC-Launcher-Setup-${version}.${ext}"
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico
  requestedExecutionLevel: asInvoker
  verifyUpdateCodeSignature: false
  publish:
    provider: github
    owner: musbabaff
    repo: marinmc-launcher

nsis:
  # Silent one-click, per-user install: enables seamless background auto-updates
  # with NO UAC prompt and automatic relaunch. perMachine:false installs to
  # %LOCALAPPDATA%\Programs (no admin needed); allowElevation:false never asks UAC.
  oneClick: true
  perMachine: false
  allowElevation: false
  runAfterFinish: true
  installerIcon: assets/icon.ico
  installerHeaderIcon: assets/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: MarinMC Launcher
  deleteAppDataOnUninstall: false

mac:
  target:
    - dmg
  icon: assets/icon.icns
  category: public.app-category.games
  publish:
    provider: github
    owner: musbabaff
    repo: marinmc-launcher

linux:
  target:
    - AppImage
  icon: assets/icon.png
  category: Game
  publish:
    provider: github
    owner: musbabaff
    repo: marinmc-launcher

publish:
  provider: github
  owner: musbabaff
  repo: marinmc-launcher
